<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="OpenNova - Smart Booking & Management Web App" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      function initGoogleMaps() {
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyAB0k05dH8yvtYU3LsjQdOAeDdgiXBku88&libraries=places&loading=async';
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      }
      // Load Google Maps after page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initGoogleMaps);
      } else {
        initGoogleMaps();
      }
    </script>
    <title>OpenNova - Smart Booking Platform</title>
    <!-- Fix for browser extension errors -->
    <script src="%PUBLIC_URL%/extension-fix.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
