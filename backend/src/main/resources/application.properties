# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/opennova
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your-db-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Encoding Configuration - Fix for symbol display issues
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# JWT Configuration
jwt.secret=openNovaSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3002,http://127.0.0.1:3002,http://localhost:3003,http://127.0.0.1:3003

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY:your-google-maps-api-key}

# Google OAuth2 Configuration
google.oauth2.client-id=${GOOGLE_OAUTH_CLIENT_ID:your-google-oauth-client-id}
google.oauth2.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:your-google-oauth-client-secret}
google.oauth2.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

# Application Configuration
app.name=OpenNova
app.version=1.0.0
app.upload.dir=uploads

# HTTP Configuration to fix chunked encoding issues
server.compression.enabled=false
server.http2.enabled=false
spring.mvc.async.request-timeout=30000