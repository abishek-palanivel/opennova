# Production Configuration for Railway/Render Deployment
server.port=${PORT:8080}

# Database Configuration (Railway/Render will provide DATABASE_URL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=${PORT:10000}
server.servlet.context-path=/

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:https://your-frontend-domain.com}

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY}

# Google OAuth2 Configuration
google.oauth2.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth2.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth2.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:https://your-app.railway.app/api/auth/google/callback}

# Application Configuration
app.name=OpenNova
app.version=1.0.0
app.upload.dir=uploads

# Production optimizations
server.compression.enabled=true
server.http2.enabled=true
spring.mvc.async.request-timeout=30000

# Logging
logging.level.com.opennova=INFO
logging.level.org.springframework.security=WARN